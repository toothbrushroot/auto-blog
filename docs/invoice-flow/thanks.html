<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're on the list! — InvoiceFlow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
  }
  .card {
    max-width: 480px;
    padding: 60px 32px;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 12px;
  }
  .checkmark {
    width: 64px;
    height: 64px;
    margin: 0 auto 24px;
    background: #238636;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: white;
  }
  h1 { color: #f0f6fc; font-size: 28px; margin-bottom: 12px; }
  p { color: #8b949e; font-size: 16px; margin-bottom: 8px; line-height: 1.6; }
  .note { margin-top: 32px; font-size: 13px; color: #484f58; }
  a { color: #58a6ff; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="checkmark">✓</div>
  <h1>You're on the list!</h1>
  <p>We'll email you when InvoiceFlow launches.</p>
  <p>Early birds get <strong style="color:#3fb950">50% off for life</strong>.</p>
  <p class="note">
    Check your inbox for a confirmation email from FormSubmit.<br>
    You'll need to confirm once, then you're all set.
  </p>
  <p class="note" style="margin-top:16px;">
    <a href="/auto-blog/invoice-flow/">← Back to InvoiceFlow</a>
  </p>
</div>
</body>
</html>
